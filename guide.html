<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRUA 캠퍼스 투어 가이드팀 모집</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <p class="eyebrow">GRUA CAMPUS TOUR</p>
      <h1>16인의 가이드를 찾습니다</h1>
      <p class="hero-desc">
        자신의 타입을 입력한 뒤,<br />
        지도 위에서 그 타입과 연결된 건물을 찾아 주세요.
      </p>
    </header>

    <main class="layout">
      <section class="card">
        <h2>1. 타입 입력</h2>

        <div class="form-row">
          <label for="typeCode">타입 코드</label>
          <input id="typeCode" type="text" placeholder="예: IFAP" maxlength="4" />
        </div>

        <button id="typeConfirmBtn" class="primary-btn">타입 확인하기</button>

        <div id="typeInfo" class="type-info hidden">
          <p><strong>입력한 타입:</strong> <span id="confirmedType"></span></p>
          <p><strong>안내:</strong> 지도에서 연결된 건물을 클릭해 주세요.</p>
        </div>

        <div id="messageBox" class="message-box"></div>
      </section>

      <section class="card">
        <h2>2. 지도에서 건물 찾기</h2>
        <p class="section-desc">
          지도 위 지점을 눌러 자신의 자리를 찾아 주세요.
        </p>

        <div class="map-wrap">
          <img src="./assets/campus-map.png" alt="GRUA 캠퍼스 지도" class="campus-map" />
          <div id="mapPoints"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="./assets/app.js"></script>
</body>
</html>
