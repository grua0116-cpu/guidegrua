<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRUA 캠퍼스 투어 가이드팀 모집</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <p class="eyebrow">GRUA CAMPUS TOUR</p>
      <h1>16인의 가이드를 찾습니다</h1>
      <p class="hero-desc">
        자신의 타입과 장소를 입력해 주세요.<br />
        올바르게 입력하면 가이드팀 등록이 완료됩니다.
      </p>
    </header>

    <main class="layout">
      <section class="card">
        <h2>가이드 등록</h2>

        <div class="form-row">
          <label for="typeCode">타입 코드</label>
          <input id="typeCode" type="text" placeholder="예: IFAP" maxlength="4" />
        </div>

        <div class="form-row">
          <label for="placeName">장소명</label>
          <input id="placeName" type="text" placeholder="예: 도서관" />
        </div>

        <button id="submitBtn" class="primary-btn">등록 확인하기</button>

        <div id="messageBox" class="message-box"></div>
      </section>

      <section class="card">
        <h2>장소 안내</h2>
        <p class="section-desc">
          아래 캠퍼스 지도를 참고해 장소명을 입력해 주세요.
        </p>

        <div class="map-wrap">
          <img src="./assets/campus-map.png" alt="GRUA 캠퍼스 지도" class="campus-map" />
        </div>
      </section>
    </main>
  </div>

  <script src="./assets/app.js"></script>
</body>
</html>
