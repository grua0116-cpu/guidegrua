<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRUA 캠퍼스 투어 가이드팀 모집</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>

  <!-- INTRO IMAGE PAGE -->
  <section id="introPage" class="intro-image-page">
    <img src="./assets/intro-image.png" alt="2026 GRUA 캠퍼스 투어 가이드팀 모집" class="intro-image" />
    <button id="startBtn" class="intro-enter-btn">입장하기</button>
  </section>

  <!-- MAIN PAGE -->
  <div id="mainPage" class="page hidden">
    <header class="hero">
      <p class="eyebrow">GRUA CAMPUS TOUR</p>
      <h1>GRUA 캠퍼스 투어 가이드팀을 찾습니다</h1>
      <p class="hero-desc">
        자신의 캠퍼스 포지션을 확인한 뒤,<br />
        지도 위에서 그 타입과 연결된 건물을 찾아 주세요.
      </p>
    </header>

    <main class="layout">
      <section class="card">
        <h2>1. 타입 입력</h2>

        <div class="form-row">
          <label for="typeCode">타입 코드</label>
          <input id="typeCode" type="text" placeholder="예: IFAP" maxlength="4" />
        </div>

        <button id="typeConfirmBtn" class="primary-btn">타입 확인하기</button>

        <div id="typeInfo" class="type-info hidden">
          <p><strong>입력한 타입:</strong> <span id="confirmedType"></span></p>
          <p><strong>안내:</strong> 지도에서 연결된 건물을 클릭해 주세요.</p>
        </div>

        <div id="messageBox" class="message-box"></div>
      </section>

      <section class="card">
        <h2>2. 지도에서 건물 찾기</h2>
        <p class="section-desc">
          지도 위 지점을 눌러 자신의 자리를 찾아 주세요.
        </p>

        <div class="map-wrap">
          <img src="./assets/campus-map.png" alt="GRUA 캠퍼스 지도" class="campus-map" />
          <div id="mapPoints"></div>
        </div>
      </section>

      <section id="resultCard" class="card result-card hidden">
        <div class="result-badge">GUIDE TEAM</div>
        <h2>가이드팀 등록 완료</h2>
        <p id="resultTypeText" class="result-type"></p>
        <p id="resultBuildingText" class="result-building"></p>
        <p class="result-desc">
          당신의 자리가 확인되었습니다.<br />
          이제 당신의 캠퍼스 포지션이 등록됐습니다.
        </p>
        <img src="./assets/bear-team.png" alt="곰돌이 가이드팀" class="bear-image" />
      </section>
    </main>
  </div>

  <script src="./assets/app.js"></script>
</body>
</html>
